name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Typst
        uses: typst-community/setup-typst@v4
      - name: Install Hunspell
        run: sudo apt-get update && sudo apt-get install -y hunspell hunspell-it hunspell-en-us
      - name: Validate spellcheck script
        run: bash -n scripts/spellcheck.sh
      - name: Hunspell spellcheck
        run: bash scripts/spellcheck.sh
      - name: Typst compile
        run: typst compile thesis.typ thesis.pdf --pdf-standard a-3b
      - name: Prepare Pages bundle
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          mkdir -p dist
          cp thesis.pdf dist/thesis.pdf
          cat <<'EOF' > dist/index.html
          <!DOCTYPE html>
          <html lang="it">
            <head>
              <meta charset="utf-8" />
              <meta http-equiv="refresh" content="0; url=./thesis.pdf" />
              <title>Tesi</title>
            </head>
            <body>
              <p>Apri il PDF della tesi: <a href="./thesis.pdf">thesis.pdf</a></p>
            </body>
          </html>
          EOF
      - name: Upload artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: PDF
          path: dist/
  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: checks
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: PDF
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: "."
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
